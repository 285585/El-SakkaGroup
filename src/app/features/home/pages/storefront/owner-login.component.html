<section class="owner-login-page">
  <form class="owner-login-card" (ngSubmit)="submit()">
    <h1>{{ authMode === 'login' ? 'تسجيل الدخول' : 'إنشاء حساب جديد' }}</h1>
    <p>
      {{ authMode === 'login'
        ? 'ادخل اسم المستخدم وكلمة المرور. حساب المالك يعمل من نفس الشاشة.'
        : 'املأ بياناتك كاملة لإنشاء حساب جديد.' }}
    </p>

    <div class="mode-switch">
      <button
        type="button"
        [class.active]="authMode === 'login'"
        (click)="setAuthMode('login')"
      >
        تسجيل الدخول
      </button>
      <button
        type="button"
        [class.active]="authMode === 'register'"
        (click)="setAuthMode('register')"
      >
        إنشاء حساب
      </button>
    </div>

    <ng-container *ngIf="authMode === 'login'">
      <label>
        اسم المستخدم
        <input type="text" name="username" [(ngModel)]="username" required />
      </label>

      <label>
        كلمة المرور
        <input type="password" name="password" [(ngModel)]="password" required />
      </label>
    </ng-container>

    <ng-container *ngIf="authMode === 'register'">
      <label>
        الاسم الأول
        <input type="text" name="registerFirstName" [(ngModel)]="registerFirstName" required />
      </label>
      <label>
        الاسم الأخير
        <input type="text" name="registerLastName" [(ngModel)]="registerLastName" required />
      </label>
      <label>
        رقم الهاتف
        <input type="text" name="registerPhone" [(ngModel)]="registerPhone" required />
      </label>
      <label>
        البريد الإلكتروني
        <input type="email" name="registerEmail" [(ngModel)]="registerEmail" required />
      </label>
      <label>
        اسم المستخدم
        <input type="text" name="registerUsername" [(ngModel)]="registerUsername" required />
      </label>
      <label>
        كلمة المرور
        <input type="password" name="registerPassword" [(ngModel)]="registerPassword" required />
      </label>
      <label>
        تأكيد كلمة المرور
        <input
          type="password"
          name="registerPasswordConfirm"
          [(ngModel)]="registerPasswordConfirm"
          required
        />
      </label>
    </ng-container>

    <button type="submit" [disabled]="isSubmitting">
      {{ isSubmitting ? 'جارٍ التنفيذ...' : authMode === 'login' ? 'دخول' : 'إنشاء الحساب' }}
    </button>

    <p class="status status--error" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="status status--success" *ngIf="successMessage">{{ successMessage }}</p>
  </form>
</section>
