<section class="owner-login-page">
  <form class="owner-login-card" (ngSubmit)="submit()">
    <h1>تسجيل الدخول</h1>
    <p>ادخل اسم المستخدم وكلمة المرور. حساب المالك يعمل من نفس الشاشة.</p>

    <ng-container *ngIf="!showSetupForm">
      <label>
        اسم المستخدم
        <input type="text" name="username" [(ngModel)]="username" required />
      </label>

      <label>
        كلمة المرور
        <input type="password" name="password" [(ngModel)]="password" required />
      </label>
      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'جارٍ التنفيذ...' : 'دخول' }}
      </button>

      <div class="gmail-activation">
        <h3>أول مرة؟ فعّل الحساب عبر Gmail</h3>
        <p>اضغط الزر وسيتم تحويلك إلى Gmail/Google للموافقة، ثم تختار اسم المستخدم وكلمة المرور.</p>
        <button type="button" class="gmail-btn" (click)="startGoogleActivation()">
          تفعيل عبر Gmail
        </button>
      </div>
    </ng-container>

    <ng-container *ngIf="showSetupForm">
      <div class="gmail-approved">
        <strong>تمت الموافقة من Gmail:</strong>
        <span>{{ googleEmail }}</span>
      </div>

      <label>
        اسم المستخدم الجديد
        <input type="text" name="setupUsername" [(ngModel)]="setupUsername" required />
      </label>

      <label>
        كلمة المرور الجديدة
        <input type="password" name="setupPassword" [(ngModel)]="setupPassword" required />
      </label>

      <label>
        تأكيد كلمة المرور
        <input
          type="password"
          name="setupPasswordConfirm"
          [(ngModel)]="setupPasswordConfirm"
          required
        />
      </label>

      <button type="submit" [disabled]="isSettingUp">
        {{ isSettingUp ? 'جارٍ الحفظ...' : 'حفظ بيانات الدخول' }}
      </button>
    </ng-container>

    <p class="status status--error" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="status status--success" *ngIf="successMessage">{{ successMessage }}</p>
  </form>
</section>
