<div class="notice-bar">
  <i class="pi pi-bolt"></i>
  <span>عروض خاصة على لابات الأعمال والجيمينج + دعم فني قبل وبعد البيع</span>
</div>

<header class="main-header">
  <a routerLink="/" class="brand-link">
    <img src="assets/images/logo.png" alt="El-Sakka Group Logo" />
    <div>
      <strong>El-Sakka Group</strong>
      <small>Laptops & Accessories Store</small>
    </div>
  </a>

  <nav class="main-nav">
    <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }"
      >المتجر</a
    >
    <a routerLink="/cart" routerLinkActive="is-active" class="cart-link">
      <i class="pi pi-shopping-cart"></i>
      <span>السلة</span>
      <b *ngIf="(cartItemsCount$ | async) as count">{{ count }}</b>
    </a>
    <a routerLink="/contact" routerLinkActive="is-active">تواصل معنا</a>
    <a *ngIf="isAuthenticated$ | async" routerLink="/profile" routerLinkActive="is-active">
      بروفايلي
    </a>
    <span *ngIf="isAuthenticated$ | async" class="user-chip">
      أهلاً {{ (currentUser$ | async)?.username }}
    </span>
    <a
      *ngIf="!(isAuthenticated$ | async)"
      routerLink="/login"
      routerLinkActive="is-active"
      >دخول / تسجيل</a
    >
    <a
      *ngIf="ownerMode$ | async"
      routerLink="/owner/dashboard"
      routerLinkActive="is-active"
      >لوحة المالك</a
    >
    <button *ngIf="isAuthenticated$ | async" type="button" class="nav-btn" (click)="logout()">
      تسجيل خروج
    </button>
  </nav>

  <div class="header-phone">
    <i class="pi pi-phone"></i>
    <span dir="ltr">01066449644</span>
  </div>
</header>
